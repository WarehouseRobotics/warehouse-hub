services:
  business-api:
    build:
      context: .
    command: sh -c "npm install --node-llama-cpp-postinstall=skip && npm run dev"
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      DATABASE_PATH: /data/business-api.sqlite
      UPLOAD_DIR: /data/uploads
      API_KEY: test-api-key
    volumes:
      - .:/app
      - business_api_node_modules:/app/node_modules
      - ./data:/data

volumes:
  business_api_node_modules:
