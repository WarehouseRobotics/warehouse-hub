services:
  business-api:
    build:
      context: ..
      dockerfile: business-api/Dockerfile
    working_dir: /workspace/business-api    
    command: sh -c "npm run dev"
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      DATABASE_PATH: /data/business-api.sqlite
      UPLOAD_DIR: /data/uploads
      API_KEY: test-api-key
    volumes:
      - ..:/workspace
      - business_api_node_modules:/workspace/business-api/node_modules
      - business_schemas_node_modules:/workspace/packages/business-schemas/node_modules
      - ./data:/data
      - ./test-data:/workspace/business-api/test-data

volumes:
  business_api_node_modules:
  business_schemas_node_modules:
