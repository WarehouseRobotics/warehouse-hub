<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Warehouse Hub · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/tokens.css"/>
<style>
  html, body { background: #E8E5DD; }
  body { margin: 0; font-family: var(--font-sans); color: var(--ink-0); }
  /* hide the iframe-internal scrollbar a touch */
  iframe { display: block; border: 0; background: var(--paper-1); }
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const PHONE_W = 390;
const PHONE_H = 844;

function Phone({ src }) {
  // IOSDevice ships its own status bar + home indicator.
  // We size to a real iPhone viewport (390×844) and embed each
  // mobile page as an iframe so it renders 1:1, no zoom artifacts.
  return (
    <IOSDevice width={PHONE_W} height={PHONE_H}>
      <iframe
        src={src}
        title={src}
        width={PHONE_W}
        height={PHONE_H}
        style={{ width: PHONE_W, height: PHONE_H, border: 0, background: "var(--paper-1)" }}
      />
    </IOSDevice>
  );
}

const SCREENS = [
  { id: "contacts", label: "01 · Contacts",  src: "Mobile-Contacts.html",
    note: "List + relationship-graph detail. Bottom-nav primary, agent FAB drops a context sheet." },
  { id: "invoices", label: "02 · Invoices",  src: "Mobile-Invoices.html",
    note: "Filter chips, KPI strip, traceable totals. Detail uses a sticky action bar for Send / Remind." },
  { id: "tasks",    label: "03 · Tasks",     src: "Mobile-Tasks.html",
    note: "Channel between you and the agent team. Done collapses by default; agent items inline." },
];

function App() {
  return (
    <DesignCanvas
      title="Warehouse Hub · Mobile"
      subtitle="iPhone screens for the operator on the move — same data model and agent surface as desktop, re-laid out for thumb-reach."
    >
      <DCSection id="mobile" title="Mobile screens" subtitle="Three-pane survey · iPhone 14 (390 × 844)">
        {SCREENS.map(s => (
          <DCArtboard
            key={s.id}
            id={s.id}
            label={s.label}
            width={PHONE_W + 40}
            height={PHONE_H + 40}
            style={{ background: "transparent", boxShadow: "none", border: 0, padding: 20 }}
          >
            <Phone src={s.src}/>
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body></html>
