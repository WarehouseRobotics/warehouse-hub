<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Warehouse Hub · Contacts (mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/tokens.css"/>
<link rel="stylesheet" href="assets/components.css"/>
<link rel="stylesheet" href="assets/mobile.css"/>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/shell.jsx"></script>
<script type="text/babel" src="assets/mobile-shell.jsx"></script>
<script type="text/babel" src="assets/boot.jsx"></script>
<script type="text/babel">
const { useState } = React;

function roleBadge(role) {
  if (role === "customer") return <span className="wh-badge info"><span className="dot"/>customer</span>;
  if (role === "supplier") return <span className="wh-badge ember"><span className="dot"/>supplier</span>;
  return <span className="wh-badge"><span className="dot"/>both</span>;
}

function ContactDetail({ id, onBack }) {
  const sel = CONTACTS.find(c => c.id === id) || CONTACTS[0];
  return (
    <MAppShell active="contacts" kicker="CRM · Contact" title={sel.name} agentPreset="advisor" hasActionBar hideAgentFab>
      <button className="wh-m-back" onClick={onBack}><I.chev size={14} style={{ transform: "rotate(180deg)" }}/> Contacts</button>

      <div className="wh-m-card" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div className="wh-avatar xl">{sel.name[0]}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 17, fontWeight: 500, letterSpacing: "-0.012em" }}>{sel.name}</div>
            <div className="micro" style={{ marginTop: 2 }}>{sel.id} · {sel.country} · {sel.city}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {roleBadge(sel.role)}
          {sel.tags.map(t => <span key={t} className="wh-badge">{t}</span>)}
        </div>
      </div>

      <div className="wh-m-kpi-strip">
        <div className="wh-m-kpi-cell">
          <div className="l">Open balance</div>
          <div className="v" style={{ color: Number(sel.openBalance) > 0 ? "var(--danger)" : "var(--ink-3)" }}>{fmtEUR(sel.openBalance)}</div>
        </div>
        <div className="wh-m-kpi-cell">
          <div className="l">Active deals</div>
          <div className="v">{sel.deals}</div>
        </div>
      </div>

      <div className="wh-m-card">
        <div className="micro" style={{ marginBottom: 10 }}>Details</div>
        <dl className="wh-dl" style={{ gridTemplateColumns: "100px 1fr", rowGap: 8, fontSize: 13 }}>
          <dt>Tax ID</dt>    <dd className="mono">{sel.tax}</dd>
          <dt>Email</dt>     <dd className="mono" style={{ color: "var(--ember-ink)", overflow: "hidden", textOverflow: "ellipsis" }}>{sel.email}</dd>
          <dt>Phone</dt>     <dd className="mono">+34 91 555 010</dd>
          <dt>Address</dt>   <dd>{sel.city} · {sel.country}</dd>
          <dt>Website</dt>   <dd className="mono" style={{ color: "var(--ember-ink)" }}>{sel.name.toLowerCase().replace(/[^a-z]/g, "")}.example</dd>
        </dl>
      </div>

      <div className="wh-m-card" style={{ padding: 0 }}>
        <div style={{ padding: "12px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid var(--rule-1)" }}>
          <div className="micro">People</div>
          <button className="wh-btn ghost sm"><I.plus size={12}/> Add</button>
        </div>
        {[
          { name: "Nadia Holmberg", role: "Procurement", email: "n.holmberg@", primary: true },
          { name: "Björn Richter",  role: "CFO",         email: "b.richter@",   primary: false },
        ].map((p, i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "center", padding: "12px 14px", borderTop: i === 0 ? 0 : "1px solid var(--rule-1)" }}>
            <div className="wh-avatar lg">{p.name.split(" ").map(x => x[0]).join("")}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>
                {p.name} {p.primary && <span className="wh-badge ember">primary</span>}
              </div>
              <div className="mono" style={{ fontSize: 11, color: "var(--ink-3)" }}>{p.role} · {p.email}</div>
            </div>
            <button className="wh-m-icon-btn"><I.more /></button>
          </div>
        ))}
      </div>

      <div className="wh-m-card">
        <div className="micro" style={{ marginBottom: 10 }}>Recent interactions</div>
        <div className="wh-timeline">
          <div className="item agent"><div className="dot"></div><div className="body"><span className="actor">Marketing Agent</span> drafted Q2 follow-up</div><div className="meta">today</div></div>
          <div className="item"><div className="dot"></div><div className="body"><span className="actor">Patricia</span> sent invoice 2026-0041</div><div className="meta">today</div></div>
          <div className="item"><div className="dot"></div><div className="body"><span className="actor">Nadia</span> approved scope</div><div className="meta">Mar 29</div></div>
        </div>
      </div>

      <div className="wh-m-action-bar">
        <button className="wh-btn"><I.send size={14}/> Email</button>
        <button className="wh-btn"><I.invoice size={14}/> Invoice</button>
        <button className="wh-btn primary"><I.plus size={14}/> New deal</button>
      </div>
    </MAppShell>
  );
}

function ContactsList({ onOpen }) {
  const [tab, setTab] = useState("all");
  const filtered = CONTACTS.filter(c =>
    tab === "all" ||
    (tab === "customer" && (c.role === "customer" || c.role === "both")) ||
    (tab === "supplier" && (c.role === "supplier" || c.role === "both"))
  );

  return (
    <MAppShell active="contacts" kicker="CRM · Registry" title="Contacts" agentPreset="advisor">
      <div className="wh-m-page-head">
        <div className="kicker">CRM · Registry</div>
        <h1>Contacts</h1>
        <div className="sub">{CONTACTS.length} companies · shared across sales &amp; accounting</div>
      </div>

      <div className="wh-m-search">
        <I.search />
        <input placeholder="Search by name, tax ID, tag…" />
      </div>

      <div className="wh-m-chips">
        <button className={`wh-m-chip ${tab === "all" ? "on" : ""}`} onClick={() => setTab("all")}>
          All <span className="count">{CONTACTS.length}</span>
        </button>
        <button className={`wh-m-chip ${tab === "customer" ? "on" : ""}`} onClick={() => setTab("customer")}>
          Customers <span className="count">{CONTACTS.filter(c => c.role === "customer" || c.role === "both").length}</span>
        </button>
        <button className={`wh-m-chip ${tab === "supplier" ? "on" : ""}`} onClick={() => setTab("supplier")}>
          Suppliers <span className="count">{CONTACTS.filter(c => c.role === "supplier" || c.role === "both").length}</span>
        </button>
        <button className="wh-m-chip">
          <I.filter /> Country
        </button>
        <button className="wh-m-chip">
          <I.tag /> Tags
        </button>
        <button className="wh-m-chip">
          Open balance &gt; 0
        </button>
      </div>

      <div className="wh-m-shead">
        <span>{filtered.length} companies</span>
        <span className="n">A → Z</span>
      </div>

      <div className="wh-m-list">
        {filtered.map(c => (
          <div key={c.id} className="wh-m-c-card" onClick={() => onOpen(c.id)}>
            <div className="av">{c.name[0]}</div>
            <div style={{ minWidth: 0 }}>
              <div className="name">{c.name}</div>
              <div className="meta">
                <span>{c.id}</span>
                <span style={{ opacity: 0.5 }}>·</span>
                <span>{c.city}</span>
                <span style={{ opacity: 0.5 }}>·</span>
                <span style={{
                  background: "var(--paper-2)", border: "1px solid var(--rule-1)",
                  padding: "0 5px", borderRadius: 3,
                }}>{c.country}</span>
              </div>
            </div>
            <div className="right">
              {roleBadge(c.role)}
              {Number(c.openBalance) > 0 && (
                <div className="bal" style={{ color: "var(--danger)" }}>{fmtEUR(c.openBalance)}</div>
              )}
            </div>
          </div>
        ))}
      </div>

      <div style={{ height: 4 }} />
    </MAppShell>
  );
}

function ContactsPage() {
  const [selected, setSelected] = useState(null);
  return selected
    ? <ContactDetail id={selected} onBack={() => setSelected(null)} />
    : <ContactsList onOpen={(id) => setSelected(id)} />;
}

mountApp(<ContactsPage/>);
</script>
</body></html>
