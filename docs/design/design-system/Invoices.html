<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Warehouse Hub · Sales invoices</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/tokens.css"/>
<link rel="stylesheet" href="assets/components.css"/>
<style>
  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 16px; }
  .summary .c { padding: 14px; background: var(--paper-1); border: 1px solid var(--rule-1); border-radius: 8px; }
  .summary .l { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .summary .v { font-family: var(--font-mono); font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; margin-top: 6px; }
  .summary .s { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 4px; }

  .inv-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: flex-start; }

  /* PDF-ish preview */
  .pdf {
    background: var(--paper-0); border: 1px solid var(--rule-1); border-radius: 4px;
    padding: 36px 40px; font-family: var(--font-sans); font-size: 12px;
    color: var(--ink-1); min-height: 760px;
    box-shadow: var(--shadow-flat);
  }
  .pdf .head-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  .pdf .title { font-size: 28px; font-weight: 500; letter-spacing: -0.028em; margin: 0; }
  .pdf .sub  { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; margin-top: 4px; }
  .pdf .meta { text-align: right; font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); letter-spacing: 0.02em; }
  .pdf .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; padding: 16px 0; border-top: 1px solid var(--rule-2); border-bottom: 1px solid var(--rule-2); margin-bottom: 20px; }
  .pdf .parties .l { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .pdf .parties h4 { margin: 0; font-size: 13px; font-weight: 500; }
  .pdf .parties p { margin: 2px 0; font-size: 11.5px; color: var(--ink-2); }
  .pdf table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .pdf thead th { text-align: left; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); padding: 8px 0; border-bottom: 1px solid var(--rule-2); }
  .pdf thead th.num { text-align: right; }
  .pdf tbody td { padding: 10px 0; border-bottom: 1px solid var(--rule-1); vertical-align: top; font-size: 12px; }
  .pdf tbody td.num { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .pdf .totals { display: grid; grid-template-columns: 1fr 220px; gap: 20px; }
  .pdf .totals .t-rows { font-family: var(--font-mono); font-size: 12px; }
  .pdf .totals .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .pdf .totals .grand { border-top: 1px solid var(--rule-2); margin-top: 6px; padding-top: 10px; font-size: 15px; font-weight: 600; color: var(--ember-ink); }
  .pdf .foot { margin-top: 32px; font-size: 10.5px; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: 0.04em; line-height: 1.6; }
  .pdf .num-badge { display: inline-block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ember-ink); background: var(--ember-soft); padding: 2px 8px; border-radius: 4px; }
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/shell.jsx"></script>
<script type="text/babel" src="assets/boot.jsx"></script>
<script type="text/babel">
const { useState } = React;

function InvoicesList({ onOpen, selectedId }) {
  return (
    <>
      <div className="wh-page-head">
        <div>
          <div className="micro">Accounting · Q1–Q2 2026</div>
          <h1>Sales invoices</h1>
          <div className="sub">41 invoices · €38,210.00 invoiced in Q1 · 1 overdue</div>
        </div>
        <div className="wh-page-actions">
          <button className="wh-btn"><I.download/> Export CSV</button>
          <button className="wh-btn primary"><I.plus/> New invoice</button>
        </div>
      </div>

      <div className="summary">
        <div className="c"><div className="l">Issued · Q1</div><div className="v">€ 38,210.00</div><div className="s">9 invoices</div></div>
        <div className="c"><div className="l">Paid</div><div className="v" style={{color:'var(--ok)'}}>€ 22,636.00</div><div className="s">6 invoices · 59%</div></div>
        <div className="c"><div className="l">Outstanding</div><div className="v">€ 15,574.00</div><div className="s">2 open · 1 overdue</div></div>
        <div className="c"><div className="l">Avg DSO</div><div className="v">27<span style={{fontSize:13, color:'var(--ink-3)', marginLeft:4}}>days</span></div><div className="s">vs 30 terms</div></div>
      </div>

      <div className="wh-filterbar" style={{ marginBottom: 12 }}>
        <div className="wh-input" style={{ width: 240 }}><I.search/><input placeholder="Search customer, number…"/></div>
        <div className="wh-btn sm">Period <span style={{color:'var(--ink-3)',marginLeft:4}}>Q1 2026</span> <I.chevD size={12}/></div>
        <div className="wh-btn sm">Status <span style={{color:'var(--ink-3)',marginLeft:4}}>all</span> <I.chevD size={12}/></div>
        <div className="wh-btn sm">Customer <span style={{color:'var(--ink-3)',marginLeft:4}}>any</span> <I.chevD size={12}/></div>
        <div className="spacer"/>
        <div className="wh-segmented"><button className="on">Table</button><button>Aging</button></div>
      </div>

      <div className="wh-card" style={{ overflow: 'hidden' }}>
        <table className="wh-table">
          <thead><tr>
            <th style={{ width: 36 }}><input type="checkbox"/></th>
            <th>Number</th><th>Customer</th><th>Project</th>
            <th className="num">Net</th><th className="num">VAT</th><th className="num">Gross</th>
            <th>Status</th><th>Issued</th><th>Due</th>
            <th style={{ width: 28 }}></th>
          </tr></thead>
          <tbody>
            {INVOICES.map(r => (
              <tr key={r.id} className={selectedId===r.id?'selected':''} onClick={() => onOpen(r.id)}>
                <td><input type="checkbox" onClick={e => e.stopPropagation()}/></td>
                <td className="id" style={{ color: 'var(--ember-ink)', fontWeight: 500 }}>{r.number}</td>
                <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="wh-avatar">{r.customer[0]}</div>{r.customer}</div></td>
                <td style={{ color:'var(--ink-2)' }}>{r.project}</td>
                <td className="num">{fmtEUR(r.net)}</td>
                <td className="num" style={{color:'var(--ink-3)'}}>{fmtEUR(r.tax)}</td>
                <td className="num" style={{fontWeight:500}}>{fmtEUR(r.gross)}</td>
                <td><StatusBadge status={r.status}/></td>
                <td className="mono">{r.issued}</td>
                <td className="mono">{r.due}</td>
                <td><I.more size={14} style={{color:'var(--ink-3)'}}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

function InvoiceDetail({ id, onBack }) {
  const r = INVOICES.find(x => x.id === id) || INVOICES[0];
  return (
    <>
      <div className="wh-page-head">
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
            <a onClick={onBack} style={{ cursor:'pointer', color:'var(--ink-3)', fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.04em' }}>Sales invoices</a>
            <span style={{ color:'var(--ink-3)' }}>/</span>
            <span className="mono" style={{ fontSize:11, color:'var(--ink-3)', letterSpacing:'0.04em' }}>{r.id}</span>
          </div>
          <h1 style={{ display:'flex', alignItems:'center', gap:12 }}>
            <span>Invoice {r.number}</span>
            <StatusBadge status={r.status}/>
          </h1>
          <div className="sub">To {r.customer} · issued {r.issued} · due {r.due}</div>
        </div>
        <div className="wh-page-actions">
          <button className="wh-btn"><I.download size={13}/> PDF</button>
          <button className="wh-btn"><I.link size={13}/> Copy link</button>
          <button className="wh-btn primary"><I.send size={13}/> Send reminder</button>
        </div>
      </div>

      <div className="inv-layout">
        {/* Left: PDF-ish preview */}
        <div className="pdf">
          <div className="head-row">
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: 12 }}>
                <div id="inv-mark"></div>
                <span style={{ fontFamily:'var(--font-mono)', fontSize:12, letterSpacing:'0.04em' }}>Northwind Robotics</span>
              </div>
              <h2 className="title">Invoice</h2>
              <div className="sub">{r.number}</div>
            </div>
            <div className="meta">
              <div><span style={{color:'var(--ink-3)'}}>Issue</span> &nbsp;{r.issued}</div>
              <div><span style={{color:'var(--ink-3)'}}>Service</span> &nbsp;2026-03-31</div>
              <div><span style={{color:'var(--ink-3)'}}>Due</span> &nbsp;{r.due}</div>
              <div style={{ marginTop: 8 }}><span className="num-badge">net 30</span></div>
            </div>
          </div>

          <div className="parties">
            <div>
              <div className="l">From</div>
              <h4>Northwind Robotics SL</h4>
              <p>Calle de Alcalá 42, 28014 Madrid · ES</p>
              <p>VAT ES B12345678</p>
              <p>billing@northwind.example</p>
            </div>
            <div>
              <div className="l">Bill to</div>
              <h4>{r.customer}</h4>
              <p>Friedrichstraße 88, 10117 Berlin · DE</p>
              <p>VAT DE123456789</p>
              <p>ap@acme-retail.example</p>
            </div>
          </div>

          <table>
            <thead><tr>
              <th>Description</th><th className="num" style={{textAlign:'right'}}>Qty</th>
              <th className="num" style={{textAlign:'right'}}>Unit</th><th className="num" style={{textAlign:'right'}}>VAT</th>
              <th className="num" style={{textAlign:'right'}}>Amount</th>
            </tr></thead>
            <tbody>
              <tr>
                <td><div>Warehouse operations audit</div><div style={{fontSize:10.5, color:'var(--ink-3)', fontFamily:'var(--font-mono)', marginTop:2}}>deal_000072 · kick-off 2026-03-12</div></td>
                <td className="num">1</td><td className="num">900.00</td><td className="num">21%</td><td className="num">900.00</td>
              </tr>
              <tr>
                <td><div>Automation recommendations workshop</div><div style={{fontSize:10.5, color:'var(--ink-3)', fontFamily:'var(--font-mono)', marginTop:2}}>2 sessions · Madrid HQ · 2026-03-28</div></td>
                <td className="num">1</td><td className="num">600.00</td><td className="num">21%</td><td className="num">600.00</td>
              </tr>
            </tbody>
          </table>

          <div className="totals">
            <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>
              <div className="mono" style={{letterSpacing:'0.06em'}}>Payment · SEPA credit transfer</div>
              <div className="mono" style={{letterSpacing:'0.06em'}}>ES76 ★★★★ ★★★★ ★★★★ ★★★★ 1234</div>
              <div className="mono" style={{letterSpacing:'0.06em'}}>BIC · BBVAESMM</div>
              <div style={{ marginTop: 12, fontFamily: 'var(--font-sans)', fontSize: 11.5, maxWidth: 320 }}>
                Please quote invoice number on transfer. Thank you.
              </div>
            </div>
            <div className="t-rows">
              <div className="row"><span style={{color:'var(--ink-3)'}}>Net</span>   <span>{fmtEUR(r.net)}</span></div>
              <div className="row"><span style={{color:'var(--ink-3)'}}>VAT 21%</span> <span>{fmtEUR(r.tax)}</span></div>
              <div className="row grand"><span>Total due</span><span>{fmtEUR(r.gross)}</span></div>
            </div>
          </div>

          <div className="foot">
            Generated via Warehouse Hub · document doc_{r.id.slice(-4)} · sha256 9ab…f03
          </div>
        </div>

        {/* Right: metadata & actions */}
        <div>
          <div className="wh-card" style={{ marginBottom: 16 }}>
            <div className="wh-card-head"><h3>Status</h3><span className="micro">live</span></div>
            <div className="wh-card-body">
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 0, border: '1px solid var(--rule-1)', borderRadius: 4, overflow: 'hidden', marginBottom: 16 }}>
                {['Draft','Sent','Viewed','Paid'].map((s, i) => {
                  const reached = i <= 1; const current = i === 1;
                  return (
                    <div key={s} style={{ padding: '10px 12px', borderRight: i<3?'1px solid var(--rule-1)':'0', background: current?'var(--ember-soft)':reached?'var(--paper-2)':'var(--paper-0)', color: current?'var(--ember-ink)':reached?'var(--ink-1)':'var(--ink-3)' }}>
                      <div style={{ fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase' }}>Step {i+1}</div>
                      <div style={{ fontSize:13, fontWeight:500, marginTop:2 }}>{s}</div>
                    </div>
                  );
                })}
              </div>
              <dl className="wh-dl">
                <dt>Sent to</dt>    <dd>ap@acme-retail.example</dd>
                <dt>Sent at</dt>    <dd className="mono">2026-04-02 · 08:10:00</dd>
                <dt>Opens</dt>      <dd className="mono">2 · last 2026-04-03 14:22</dd>
                <dt>Channel</dt>    <dd>Email · invoice PDF attached</dd>
              </dl>
            </div>
          </div>

          <div className="wh-card" style={{ marginBottom: 16 }}>
            <div className="wh-card-head"><h3>Totals</h3><span className="micro">EUR</span></div>
            <div className="wh-card-body">
              <dl className="wh-dl">
                <dt>Net</dt>    <dd className="num">{fmtEUR(r.net)}</dd>
                <dt>VAT</dt>    <dd className="num" style={{color:'var(--ink-3)'}}>{fmtEUR(r.tax)}</dd>
                <dt>Gross</dt>  <dd className="num" style={{fontWeight:600, fontSize:15}}>{fmtEUR(r.gross)}</dd>
                <dt>Outstanding</dt><dd className="num" style={{color:'var(--danger)'}}>{fmtEUR(r.gross)}</dd>
              </dl>
            </div>
          </div>

          <div className="wh-card" style={{ marginBottom: 16 }}>
            <div className="wh-card-head"><h3>Source</h3></div>
            <div className="wh-card-body">
              <dl className="wh-dl">
                <dt>Deal</dt>       <dd className="mono" style={{color:'var(--ember-ink)'}}>deal_000072</dd>
                <dt>Customer</dt>   <dd className="mono" style={{color:'var(--ember-ink)'}}>ct_000245 · Acme Retail</dd>
                <dt>Strategy</dt>   <dd className="mono">next (auto-number)</dd>
                <dt>Currency</dt>   <dd>EUR</dd>
                <dt>Payment terms</dt><dd>30 days</dd>
              </dl>
            </div>
          </div>

          <div className="wh-card">
            <div className="wh-card-head"><h3>Timeline</h3></div>
            <div className="wh-card-body">
              <div className="wh-timeline">
                <div className="item agent"><div className="dot"></div><div className="body"><span className="actor">Advisor Agent</span> scheduled reminder · +7d if unpaid</div><div className="meta">09:20 today</div></div>
                <div className="item ok"><div className="dot"></div><div className="body"><span className="actor">Customer</span> opened invoice</div><div className="meta">Apr 03 · 14:22</div></div>
                <div className="item"><div className="dot"></div><div className="body"><span className="actor">Patricia Ruiz</span> sent via email</div><div className="meta">Apr 02 · 08:10</div></div>
                <div className="item agent"><div className="dot"></div><div className="body"><span className="actor">Accounting Agent</span> generated draft from <span className="mono">deal_000072</span></div><div className="meta">Apr 02 · 08:05</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function InvoicesPage() {
  const [selected, setSelected] = useState("sinv_000041");
  return (
    <AppShell active="invoices" crumbs={["Accounting","Sales invoices", selected ?? ""]} agentPreset="accounting">
      {selected
        ? <InvoiceDetail id={selected} onBack={() => setSelected(null)}/>
        : <InvoicesList selectedId={null} onOpen={id => setSelected(id)}/>}
    </AppShell>
  );
}

mountApp(<InvoicesPage/>);
// Mount the brand mark inside invoice after paint
setTimeout(() => {
  const el = document.getElementById("inv-mark");
  if (el) ReactDOM.createRoot(el).render(<WRMark size={22}/>);
}, 150);
</script>
</body></html>
