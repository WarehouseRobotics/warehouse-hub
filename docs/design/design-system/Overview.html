<style>
  .ov-hero { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 20px; }
  .hero-greeting { padding: 24px; background: var(--paper-1); border: 1px solid var(--rule-1); border-radius: 10px; display: flex; flex-direction: column; gap: 16px; position: relative; overflow: hidden; }
  .hero-greeting h2 { font-size: 28px; font-weight: 500; letter-spacing: -0.024em; margin: 0; line-height: 1.15; max-width: 520px; }
  .hero-greeting h2 em { font-style: normal; color: var(--ink-3); }
  .hero-meta { display: flex; gap: 24px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; }
  .hero-meta strong { color: var(--ink-1); font-weight: 500; margin-right: 6px; }
  .hero-prompts { display: flex; flex-wrap: wrap; gap: 6px; }
  .hero-prompts .p {
    padding: 6px 10px; border: 1px solid var(--rule-1); border-radius: 999px;
    background: var(--paper-0); font-size: 12px; color: var(--ink-2); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hero-prompts .p:hover { border-color: var(--ember); color: var(--ember-ink); }
  .hero-prompts .p .sp { color: var(--ember); }
  .hero-quick { padding: 24px; background: var(--paper-inv); color: var(--paper-0); border-radius: 10px; display: flex; flex-direction: column; gap: 14px; }
  .hero-quick .q-head { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: oklch(70% 0.010 80); }
  .hero-quick .q-big { font-family: var(--font-mono); font-size: 30px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .hero-quick .q-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: oklch(82% 0.010 80); }
  .hero-quick .q-row .v { font-family: var(--font-mono); color: var(--paper-0); font-variant-numeric: tabular-nums; }
  .hero-quick .q-row .up { color: oklch(80% 0.120 145); }

  .ov-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
  .cash-card { min-height: 300px; }
  .cash-chart svg { width: 100%; height: 240px; }
  .legend { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em; }
  .legend .dt { width: 8px; height: 8px; display: inline-block; margin-right: 6px; border-radius: 1px; vertical-align: 1px; }

  .activity-item { display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; padding: 12px 20px; border-bottom: 1px solid var(--rule-1); align-items: flex-start; }
  .activity-item:last-child { border-bottom: 0; }
  .activity-item .glyph { width: 24px; height: 24px; border-radius: 4px; display: grid; place-items: center; font-family: var(--font-mono); font-size: 11px; font-weight: 500; background: var(--paper-2); color: var(--ink-2); }
  .activity-item.agent .glyph { background: var(--ember-soft); color: var(--ember-ink); }
  .activity-item .body { font-size: 13px; color: var(--ink-1); line-height: 1.4; }
  .activity-item .body .actor { font-weight: 500; }
  .activity-item .body .muted { color: var(--ink-3); }
  .activity-item .time { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.04em; white-space: nowrap; }

  .ov-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
</style>

<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/shell.jsx"></script>
<script type="text/babel" src="assets/boot.jsx"></script>
<script type="text/babel">
function CashChart() {
  const w = 720, h = 220, pad = 24;
  const months = ["Oct","Nov","Dec","Jan","Feb","Mar"];
  const inflow  = [22,18,24,28,30,34];
  const outflow = [16,17,15,19,20,22];
  const max = 40;
  const stepX = (w - pad*2) / (months.length - 1);
  const toY = v => h - pad - (v / max) * (h - pad*2);
  const mkLine = arr => arr.map((v,i) => `${i?'L':'M'} ${pad + i*stepX} ${toY(v)}`).join(' ');
  const mkArea = arr => `${mkLine(arr)} L ${pad + (arr.length-1)*stepX} ${h-pad} L ${pad} ${h-pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {[0,0.25,0.5,0.75,1].map((p,i) => (
        <line key={i} x1={pad} x2={w-pad} y1={pad + p*(h-pad*2)} y2={pad + p*(h-pad*2)} stroke="var(--rule-1)" strokeDasharray={i===4?'':'2 4'}/>
      ))}
      <path d={mkArea(inflow)} fill="var(--ember-soft)" opacity="0.7"/>
      <path d={mkLine(inflow)} fill="none" stroke="var(--ember)" strokeWidth="1.5"/>
      <path d={mkLine(outflow)} fill="none" stroke="var(--ink-2)" strokeWidth="1.25" strokeDasharray="3 3"/>
      {months.map((m,i) => (
        <text key={m} x={pad + i*stepX} y={h-6} textAnchor="middle"
              style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--ink-3)', letterSpacing: '0.08em' }}>
          {m.toUpperCase()}
        </text>
      ))}
      {inflow.map((v,i) => (
        <circle key={i} cx={pad+i*stepX} cy={toY(v)} r={i===inflow.length-1?3.5:2} fill="var(--ember)"/>
      ))}
    </svg>
  );
}

function Overview() {
  const activity = [
    { kind: 'agent',  glyph: '€', actor: 'Accounting Agent', body: <>booked expense <b className="mono">exp_000118</b> · Papelería Centro <span className="muted">· IVA 21%</span></>, time: '09:42' },
    { kind: 'human',  glyph: 'PR', actor: 'Patricia Ruiz',   body: <>sent invoice <b className="mono">2026‑0041</b> to Acme Retail GmbH</>, time: '09:12' },
    { kind: 'agent',  glyph: '◆', actor: 'Business Advisor', body: <>flagged <b>Port of Algeciras</b> — invoice overdue 3 days · proposed dunning email</>, time: '08:55' },
    { kind: 'agent',  glyph: '✦', actor: 'Marketing Agent',  body: <>drafted follow‑up for <b>Acme Retail</b> · 112 words · ready to review</>, time: '08:40' },
    { kind: 'human',  glyph: 'LM', actor: 'Laura Mendes',    body: <>moved <b>Sorter integration</b> to <span className="mono">proposal</span></>, time: '08:22' },
    { kind: 'agent',  glyph: '€', actor: 'Accounting Agent', body: <>OCR complete on 3 expense docs · 1 needs review</>, time: '08:10' },
    { kind: 'agent',  glyph: '▲', actor: 'Hub Dev Agent',    body: <>extended bot with <span className="mono">search_contacts</span> tool · version pinned</>, time: 'Yday' },
  ];

  return (
    <AppShell active="overview" crumbs={["Workspace","Overview"]} agentPreset="advisor">
      <div className="wh-page-head">
        <div>
          <div className="micro">Mon · 20 Apr 2026 · Q2 week 3</div>
          <h1>Overview</h1>
          <div className="sub">Your book at a glance. 2 agents active · 1 item needs your review.</div>
        </div>
        <div className="wh-page-actions">
          <button className="wh-btn"><I.download/> Export</button>
          <button className="wh-btn primary"><I.plus/> New invoice</button>
        </div>
      </div>

      {/* HERO */}
      <div className="ov-hero">
        <div className="hero-greeting">
          <div className="micro">Good morning, Patricia</div>
          <h2>Q1 closed with <span className="num" style={{color:'var(--ember)'}}>+6.2%</span> margin. <em>Today, four items want your attention.</em></h2>
          <div className="hero-prompts">
            <div className="p"><span className="sp">✦</span> Draft dunning email · Port of Algeciras</div>
            <div className="p"><span className="sp">✦</span> Approve expense exp_000118</div>
            <div className="p"><span className="sp">✦</span> Prepare Q2 VAT submission</div>
            <div className="p"><span className="sp">✦</span> Review 3 new leads from the inbox</div>
          </div>
          <div className="hero-meta" style={{ marginTop: 4 }}>
            <span><strong>9</strong>open invoices</span>
            <span><strong>€16.5k</strong>outstanding</span>
            <span><strong>14</strong>tasks · 6 with agents</span>
          </div>
        </div>

        <div className="hero-quick">
          <div className="q-head">Cash position · today</div>
          <div className="q-big">€ 48,211.04</div>
          <div className="q-row"><span>Inflows (30d)</span><span className="v up">+ € 14,320.00</span></div>
          <div className="q-row"><span>Outflows (30d)</span><span className="v">− € 7,882.11</span></div>
          <div className="q-row"><span>Runway at current burn</span><span className="v">18.4 mo</span></div>
          <div style={{ height: 1, background: 'oklch(50% 0.010 70 / 0.4)', margin: '2px 0' }} />
          <div className="q-row"><span>Next VAT · ES Modelo 303</span><span className="v">due 20 Apr</span></div>
        </div>
      </div>

      {/* KPI row */}
      <div className="grid-4" style={{ marginBottom: 20 }}>
        <div className="wh-kpi">
          <div className="k-label">MRR</div>
          <div className="k-value">€ 28.4k</div>
          <div className="k-delta">▲ 6.2% · 30d</div>
          <Spark data={[12,13,14,15,17,18,20,22,23,25,27,28]} />
        </div>
        <div className="wh-kpi">
          <div className="k-label">Outstanding</div>
          <div className="k-value">€ 16.5k</div>
          <div className="k-delta down">▲ 1 overdue · Algeciras</div>
          <Spark data={[9,10,11,14,13,15,16,16,17,15,16,16.5]} />
        </div>
        <div className="wh-kpi">
          <div className="k-label">Expenses · Mar</div>
          <div className="k-value">€ 7.88k</div>
          <div className="k-delta">on plan</div>
          <Spark data={[5,6,5.5,6.2,7,6.8,7.2,7.5,7.6,7.8,7.8,7.88]} />
        </div>
        <div className="wh-kpi">
          <div className="k-label">Agent actions · 7d</div>
          <div className="k-value">214</div>
          <div className="k-delta">▲ 18 vs last week</div>
          <Spark data={[18,22,24,22,27,28,30,34,36,32,38,42]} />
        </div>
      </div>

      {/* Main grid */}
      <div className="ov-grid" style={{ marginBottom: 20 }}>
        <div className="wh-card cash-card">
          <div className="wh-card-head">
            <h3>Cash flow · last 6 months</h3>
            <div className="legend">
              <span><span className="dt" style={{ background: 'var(--ember)' }}></span>Inflow</span>
              <span><span className="dt" style={{ background: 'var(--ink-2)' }}></span>Outflow</span>
              <div className="wh-segmented" style={{ marginLeft: 12 }}>
                <button>Week</button><button className="on">Month</button><button>Quarter</button>
              </div>
            </div>
          </div>
          <div className="wh-card-body cash-chart"><CashChart/></div>
        </div>

        <div className="wh-card" style={{ display: 'flex', flexDirection: 'column' }}>
          <div className="wh-card-head"><h3>Activity · humans &amp; agents</h3><button className="wh-btn ghost sm">All →</button></div>
          <div style={{ flex: 1, overflow: 'auto' }}>
            {activity.map((a, i) => (
              <div key={i} className={`activity-item ${a.kind}`}>
                <div className="glyph">{a.glyph}</div>
                <div className="body"><span className="actor">{a.actor}</span> {a.body}</div>
                <div className="time">{a.time}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="ov-split">
        <div className="wh-card">
          <div className="wh-card-head"><h3>Needs your review</h3><span className="wh-badge ember"><span className="dot"></span>4 items</span></div>
          <div className="wh-card-body" style={{ padding: 0 }}>
            {[
              { id: 'exp_000118', label: 'Expense · Papelería Centro SL', sub: 'Recorded by agent · pending approval', amt: '€ 145.20', act: 'Approve' },
              { id: 'sinv_000038', label: 'Invoice 2026‑0038 · Port of Algeciras', sub: 'Overdue 3 days', amt: '€ 13,794.00', act: 'Dunning' },
              { id: 'deal_000070', label: 'Deal · Fleet readiness', sub: 'Proposal draft ready from agent', amt: '€ 22,000.00', act: 'Review' },
              { id: 'exp_000116', label: 'Expense · Amazon Business', sub: 'OCR confidence low · review split', amt: '€ 499.00', act: 'Fix' },
            ].map((r, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 12, padding: '14px 20px', borderBottom: i < 3 ? '1px solid var(--rule-1)' : '0', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{r.label}</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.04em', marginTop: 2 }}>
                    {r.id} · {r.sub}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <div className="num" style={{ fontSize: 13 }}>{r.amt}</div>
                  <button className="wh-btn sm">{r.act}</button>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="wh-card">
          <div className="wh-card-head"><h3>Upcoming · this week</h3><button className="wh-btn ghost sm">Calendar →</button></div>
          <div className="wh-card-body" style={{ padding: 0 }}>
            {[
              { day: 'TUE', d: '21', title: 'Quarterly VAT · ES Modelo 303', owner: 'Accounting Agent', tag: 'auto' },
              { day: 'WED', d: '22', title: 'Onboarding call · Kröger Logistik', owner: 'Patricia Ruiz',  tag: '30 min' },
              { day: 'THU', d: '23', title: 'Proposal due · Port of Algeciras', owner: 'Laura Mendes',    tag: 'draft ready' },
              { day: 'FRI', d: '24', title: 'Content calendar · May',           owner: 'Marketing Agent', tag: 'auto' },
            ].map((e, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: '52px 1fr auto', gap: 14, padding: '14px 20px', borderBottom: i < 3 ? '1px solid var(--rule-1)' : '0', alignItems: 'center' }}>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.1em' }}>{e.day}</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 500, color: 'var(--ink-1)', lineHeight: 1 }}>{e.d}</div>
                </div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{e.title}</div>
                  <div style={{ fontSize: 11.5, color: 'var(--ink-3)', marginTop: 2 }}>{e.owner}</div>
                </div>
                <span className={`wh-badge ${e.tag === 'auto' ? 'ember' : ''}`}>{e.tag}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </AppShell>
  );
}

mountApp(<Overview/>);
</script>
